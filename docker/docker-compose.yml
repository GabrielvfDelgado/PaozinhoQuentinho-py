version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/evolution
      - EVOLUTION_API_URL=http://evolution-api:8080
      - ADMIN_PHONE=${ADMIN_PHONE}
    depends_on:
      postgres:
        condition: service_healthy
      evolution-api:
        condition: service_started

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  evolution-api:
    image: atendai/evolution-api:v1.8.7
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=your_global_api_key
      - WA_BUSINESS_ENABLED=false
      - STORE_MESSAGES=false
      - STORE_CONTACTS=false
      - STORE_CHATS=false
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evolution
      - REDIS_SAVE_INSTANCES=false
    depends_on:
      - redis
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  evolution_instances:
  evolution_store:
  postgres_data:
